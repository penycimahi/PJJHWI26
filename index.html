<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJJ Proses Bisnis dan Aspek Perpajakan HWI</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 110px; /* FIX: biar gak ketutup footer */
        }

        /* HERO */
        .hero {
            width: 100%;
            height: 45vh;
            background-image: url('Foto BDK.png');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(106,17,203,0.8), rgba(37,117,252,0.8));
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .logo-kemenkeu {
            max-width: 120px;
            margin-bottom: 15px;
        }

        .hero-content h1 {
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: 2px;
        }

        /* ICON */
        .icon-container {
            display: flex;
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            margin: -40px auto 30px;
        }

        .icon-card {
            background: white;
            flex: 1;
            padding: 25px 15px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: #2c3e50;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .icon-card:hover {
            transform: translateY(-8px);
        }

        .icon-card i {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #6a11cb;
        }

        /* CONTENT */
        .content-box {
            background: white;
            padding: 30px;
            margin-bottom: 100px;
            width: 85%;
            max-width: 800px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .link-button {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 15px 25px;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }

        .link-button i {
            margin-right: 15px;
        }

        /* 🔥 FOOTER FIXED */
        .footer-lower-third {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: linear-gradient(90deg, #1a237e 55%, rgba(26,35,126,0.85) 75%, transparent 100%);
            display: flex;
            align-items: center;
            padding: 0 30px;
            color: white;
            border-top: 4px solid #ffd700;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.25);
            overflow: hidden;
            z-index: 1000;
        }

        .footer-text {
            z-index: 2;
            font-size: 0.95rem;
        }

        /* 🔥 GAMBAR KANAN (ANTI NAIK) */
        .footer-lower-third::after {
            content: "";
            position: absolute;
            right: 0;
            bottom: 0;
            width: 260px;
            height: 80px; /* KUNCI FIX */
            background: url('Image Jul 11, 2025, 01_44_22 PM cop1y.png') no-repeat right bottom;
            background-size: contain;
            pointer-events: none;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .icon-container {
                flex-direction: column;
            }

            .footer-text {
                font-size: 0.7rem;
            }

            .footer-lower-third::after {
                width: 180px;
                height: 60px;
            }
        }
    </style>
</head>

<body>

<div class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <img src="kementerian_keuangan_republik_indonesia.png" class="logo-kemenkeu">
        <h1>KUMPULAN INFORMASI</h1>
    </div>
</div>

<div class="icon-container">
    <a href="#" class="icon-card"><i class="fas fa-video"></i><span>Meeting Room</span></a>
    <a href="#" class="icon-card"><i class="fas fa-camera-retro"></i><span>Recordings</span></a>
    <a href="#" class="icon-card"><i class="fas fa-book-open"></i><span>Bahan Tayang</span></a>
</div>

<div class="content-box">
    <h2>Pelatihan Jarak Jauh HWI</h2>

    <a href="#" class="link-button"><i class="fas fa-edit"></i> Registrasi</a>
    <a href="#" class="link-button"><i class="fas fa-calendar-alt"></i> Jadwal</a>
</div>

<footer class="footer-lower-third">
    <div class="footer-text">
        Seksi Penyelenggaraan Pembelajaran - <strong>Balai Diklat Keuangan Cimahi</strong>
    </div>
</footer>

</body>
</html>
