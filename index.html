<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelatihan Jarak Jauh Proses Bisnis dan Aspek Perpajakan Segmentasi Wajib Pajak High Wealth Individual (HWI) dan Group</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6; /* Warna background abu-abu muda seperti Gbr 1 */
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Bagian Hero atas dengan background foto dan overlay gradasi */
        .hero {
            width: 100%;
            height: 40vh; /* Tinggi hero area */
            background-image: url('Foto BDK.png'); /* Foto background buatanmu */
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* Overlay gradasi ungu ke biru di atas foto */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(106, 17, 203, 0.8), rgba(37, 117, 252, 0.8));
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2; /* Di atas overlay */
            padding: 20px;
        }

        .logo-kemenkeu {
            max-width: 150px; /* Ukuran logo */
            margin-bottom: 20px;
        }

        .hero-content h1 {
            font-weight: 600;
            margin: 0;
            font-size: 2.5rem;
            padding: 30px 20px 30px;
        }

        /* Kotak konten putih */
        .content-box {
            background: rgb(255, 255, 255);
            padding: 20px;
            margin-top: -60px auto 20px; /* Membuat kotak 'mengambang' di atas hero */
            width: 70%;
            max-width: 800px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); /* Bayangan yang lebih lembut dan dalam */
            z-index: 3;
            text-align: left;
        }

        .content-box h2 {
            text-align: center;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        /* Styling tombol link */
        .link-button {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 20px;
            padding: 18px 25px;
            /* Gradasi warna peach/orange yang kamu suka */
            background: linear-gradient(135deg, #ff9966, #ff5e62); 
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 94, 98, 0.3);
            font-size: 1.1rem;
        }

        .link-button:hover {
            transform: translateY(-3px); /* Efek terangkat saat di-hover */
            box-shadow: 0 8px 20px rgba(255, 94, 98, 0.5);
            background: linear-gradient(135deg, #ff5e62, #ff9966); /* Balik gradasi saat hover */
        }

        .link-button i {
            margin-right: 15px; /* Jarak icon ke teks */
            font-size: 1.3rem;
            width: 25px;
            text-align: center;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 1.8rem;
            }
            .content-box {
                width: 90%;
                padding: 20px;
            }
            .link-button {
                padding: 15px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <img src="kementerian_keuangan_republik_indonesia.png" alt="Logo Kemenkeu" class="logo-kemenkeu">
            <h1>KUMPULAN INFORMASI</h1>

    </div>

            <i class="fas fa-users"></i> Daftar Peserta
        </a>

</body>
</html>
